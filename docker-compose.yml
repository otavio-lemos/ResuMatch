services:
  resumatch:
    build:
      context: .
      dockerfile: Dockerfile
    image: resumatch:latest
    ports:
      - "3000:3000"
    environment:
      # ── IA ────────────────────────────────────────────────────────────────
      # Chave obrigatória para o provedor Gemini (padrão da app)
      # Copie .env.example → .env.local e preencha antes de rodar
      - GEMINI_API_KEY=${GEMINI_API_KEY}

      # ── Runtime ──────────────────────────────────────────────────────────
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

      # Sinaliza ao código que está dentro de Docker
      # → usado em lib/ai.ts para rotear Ollama via host.docker.internal
      - DOCKER_CONTAINER=true
    volumes:
      # Dados de currículos persistem entre restarts/atualizações
      - resumatch-data:/app/data
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  resumatch-data:
